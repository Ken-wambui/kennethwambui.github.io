<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ken Wambui | PCB Design Engineer & Mechatronics Engineer</title>
  <meta name="description" content="Ken Wambui — Specialized PCB Design Engineer and Mechatronics Engineer based in Kenya."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── BACKGROUND ── -->
  <div id="particles"></div>

  <!-- ── NAV ── -->
  <nav id="main-nav">
    <a class="nav-logo" onclick="switchPage('home')">KEN WAMBUI<span>.</span></a>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">☰</button>
    <ul class="nav-links" id="nav-links">
      <li><a class="nav-btn active" data-page="home">Home</a></li>
      <li><a class="nav-btn" data-page="about">About</a></li>
      <li><a class="nav-btn" data-page="services">Services</a></li>
      <li><a class="nav-btn" data-page="projects">Projects</a></li>
      <li><a class="nav-btn" data-page="resume">Resume</a></li>
      <li><a class="nav-btn" data-page="certifications">Certifications</a></li>
      <li><a class="nav-btn" data-page="blog">Blog</a></li>
      <li><a class="nav-btn" data-page="contact">Contact</a></li>
    </ul>
  </nav>

  <!-- ── PAGES ── -->
  <div id="pages-container">
    <div class="page active" id="page-home"></div>
    <div class="page" id="page-about"></div>
    <div class="page" id="page-services"></div>
    <div class="page" id="page-projects"></div>
    <div class="page" id="page-resume"></div>
    <div class="page" id="page-certifications"></div>
    <div class="page" id="page-blog"></div>
    <div class="page" id="page-contact"></div>
  </div>

  <!-- ── FOOTER ── -->
  <footer id="site-footer">
    <div class="footer-brand">KEN WAMBUI<span>.</span></div>
    <div class="footer-links">
      <a onclick="switchPage('home')">Home</a>
      <a onclick="switchPage('projects')">Projects</a>
      <a onclick="switchPage('contact')">Contact</a>
    </div>
    <div class="footer-copy">© 2026 · PCB Design Engineer · Mechatronics Engineer · Nairobi, Kenya</div>
  </footer>

  <!-- ── MODALS ── -->
  <div class="modal-overlay" id="service-modal" onclick="closeBg(event,'service-modal')">
    <div class="modal-panel">
      <div class="modal-hdr">
        <span class="modal-tag" id="svc-tag"></span>
        <button class="modal-close-btn" onclick="closeModal('service-modal')">✕</button>
      </div>
      <div class="modal-body" id="svc-body"></div>
    </div>
  </div>

  <div class="modal-overlay" id="project-modal" onclick="closeBg(event,'project-modal')">
    <div class="modal-panel">
      <div class="modal-hdr">
        <span class="modal-tag" id="prj-tag"></span>
        <button class="modal-close-btn" onclick="closeModal('project-modal')">✕</button>
      </div>
      <div class="modal-body" id="prj-body"></div>
    </div>
  </div>

  <div class="modal-overlay" id="blog-modal" onclick="closeBg(event,'blog-modal')">
    <div class="modal-panel modal-panel--wide">
      <div class="modal-hdr">
        <span class="modal-tag" id="blog-tag"></span>
        <button class="modal-close-btn" onclick="closeModal('blog-modal')">✕</button>
      </div>
      <div class="modal-body" id="blog-body"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
